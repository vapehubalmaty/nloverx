// Build nav and topic cards
const sidebar = document.getElementById('sidebar');
const container = document.getElementById('topics-container');

topics.forEach((t, i) => {
  // Nav item
  const nav = document.createElement('a');
  nav.className = 'nav-item';
  nav.href = '#topic-' + t.id;
  nav.dataset.id = t.id;
  nav.innerHTML = `<span class="nav-num">${String(t.id).padStart(2,'0')}</span><span>${t.title}</span>`;
  nav.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    nav.classList.add('active');
    const el = document.getElementById('topic-' + t.id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth' });
      if (!el.classList.contains('open')) {
        el.classList.add('open');
      }
    }
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }
  });
  sidebar.appendChild(nav);

  // Card
  const card = document.createElement('div');
  card.className = 'topic';
  card.id = 'topic-' + t.id;
  card.innerHTML = `
    <div class="topic-header">
      <span class="topic-num">${String(t.id).padStart(2,'0')}</span>
      <span class="topic-title">${t.title}</span>
      <svg class="chevron" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </div>
    <div class="topic-body">${t.body}</div>
  `;
  card.querySelector('.topic-header').addEventListener('click', () => {
    card.classList.toggle('open');
  });
  container.appendChild(card);
});

// Search
const searchInput = document.getElementById('search');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let visible = 0;

  topics.forEach(t => {
    const card = document.getElementById('topic-' + t.id);
    const navItem = document.querySelector(`.nav-item[data-id="${t.id}"]`);
    const combined = (t.title + ' ' + t.body).toLowerCase();
    const match = !q || combined.includes(q);

    if (match) {
      card.classList.remove('hidden');
      navItem.classList.remove('hidden');
      // Update highlights
      if (q) {
        card.querySelector('.topic-title').innerHTML = highlight(t.title, q);
        card.querySelector('.topic-body').innerHTML = highlight(t.body, q);
        card.classList.add('open');
      } else {
        card.querySelector('.topic-title').textContent = t.title;
        card.querySelector('.topic-body').innerHTML = t.body;
        card.classList.remove('open');
      }
      visible++;
    } else {
      card.classList.add('hidden');
      navItem.classList.add('hidden');
    }
  });

  searchCount.textContent = q ? `${visible} из ${topics.length}` : '';
  noResults.style.display = visible === 0 ? 'block' : 'none';
});

// Mobile menu
const menuBtn = document.getElementById('menu-btn');
const sidebarEl = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

menuBtn.addEventListener('click', () => {
  sidebarEl.classList.toggle('open');
  overlay.classList.toggle('show');
});

overlay.addEventListener('click', () => {
  sidebarEl.classList.remove('open');
  overlay.classList.remove('show');
});

// Scroll to top
const totop = document.getElementById('totop');
window.addEventListener('scroll', () => {
  totop.classList.toggle('show', window.scrollY > 400);
});
totop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// Active nav on scroll
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id.replace('topic-', '');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const active = document.querySelector(`.nav-item[data-id="${id}"]`);
      if (active) {
        active.classList.add('active');
        active.scrollIntoView({ block: 'nearest' });
      }
    }
  });
}, { rootMargin: '-60px 0px -60% 0px', threshold: 0 });

document.querySelectorAll('.topic').forEach(el => observer.observe(el));

// Open first card by default
if (topics.length > 0) {
  const first = document.getElementById('topic-1');
  if (first) first.classList.add('open');
  const firstNav = document.querySelector('.nav-item[data-id="1"]');
  if (firstNav) firstNav.classList.add('active');
}
</script>
