<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фармакология — 60 тем</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: #2a3347;
    --accent: #4f9cf9;
    --accent2: #7ecfb3;
    --accent3: #f97b4f;
    --text: #e8edf5;
    --text-muted: #7a8ca8;
    --text-dim: #4a5568;
    --pill-bg: #1a2438;
    --highlight: #2a3f5f;
    --sidebar-w: 300px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: -0.02em;
  }

  .header-logo span {
    color: var(--text-muted);
    font-weight: 400;
    font-size: 0.85rem;
    margin-left: 8px;
    font-family: 'Inter', sans-serif;
  }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    padding: 8px 12px 8px 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  .menu-btn {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 10px;
    cursor: pointer;
    margin-left: auto;
  }

  .search-count {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
    padding: 0 4px;
    min-width: 60px;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    padding-top: 60px;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    position: fixed;
    top: 60px;
    bottom: 0;
    left: 0;
    overflow-y: auto;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px 0 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 16px 20px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    text-decoration: none;
    color: var(--text-muted);
    font-size: 0.82rem;
    line-height: 1.3;
  }

  .nav-item:hover {
    background: var(--surface2);
    color: var(--text);
    border-left-color: var(--border);
  }

  .nav-item.active {
    background: var(--highlight);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .nav-item.hidden { display: none; }

  .nav-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    min-width: 22px;
  }

  .nav-item.active .nav-num { color: var(--accent); opacity: 0.7; }

  /* ── MAIN ── */
  main {
    flex: 1;
    margin-left: var(--sidebar-w);
    padding: 40px 48px 80px;
    max-width: 900px;
  }

  .intro {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .intro h1 {
    font-family: 'Lora', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }

  .intro h1 em {
    color: var(--accent);
    font-style: normal;
  }

  .intro p {
    color: var(--text-muted);
    font-size: 0.95rem;
    max-width: 560px;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-top: 20px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--accent2);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── TOPIC CARD ── */
  .topic {
    margin-bottom: 32px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.2s;
    scroll-margin-top: 80px;
  }

  .topic:hover { border-color: var(--border); }

  .topic.hidden { display: none; }

  .topic-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }

  .topic-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--accent);
    background: rgba(79,156,249,0.1);
    border: 1px solid rgba(79,156,249,0.2);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    margin-top: 2px;
  }

  .topic-title {
    font-family: 'Lora', serif;
    font-size: 1.08rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }

  .chevron {
    color: var(--text-dim);
    transition: transform 0.25s;
    min-width: 20px;
    margin-top: 3px;
  }

  .topic.open .chevron { transform: rotate(180deg); }

  .topic-body {
    display: none;
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
  }

  .topic.open .topic-body { display: block; }

  .topic-body p {
    font-size: 0.93rem;
    color: var(--text-muted);
    margin-top: 16px;
    line-height: 1.75;
  }

  .topic-body p:first-child { margin-top: 20px; }

  .topic-body h3 {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent2);
    margin: 22px 0 8px;
  }

  .topic-body ul, .topic-body ol {
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .topic-body ul li, .topic-body ol li {
    font-size: 0.9rem;
    color: var(--text-muted);
    padding-left: 20px;
    position: relative;
    line-height: 1.6;
  }

  .topic-body ul li::before {
    content: '–';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  .topic-body ol {
    counter-reset: ol-c;
  }

  .topic-body ol li {
    counter-increment: ol-c;
  }

  .topic-body ol li::before {
    content: counter(ol-c) '.';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
  }

  .tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    background: var(--pill-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    color: var(--text-muted);
    margin: 4px 4px 0 0;
  }

  .tag.accent { border-color: rgba(79,156,249,0.3); color: var(--accent); background: rgba(79,156,249,0.07); }
  .tag.green { border-color: rgba(126,207,179,0.3); color: var(--accent2); background: rgba(126,207,179,0.07); }
  .tag.orange { border-color: rgba(249,123,79,0.3); color: var(--accent3); background: rgba(249,123,79,0.07); }

  .drug-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 14px;
  }

  .drug-box .drug-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent3);
    margin-bottom: 6px;
  }

  .drug-box ul { margin: 0; }

  .no-results {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  .no-results svg { margin-bottom: 16px; opacity: 0.3; }
  .no-results p { font-size: 0.9rem; }

  /* ── SCROLL TO TOP ── */
  #totop {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 42px;
    height: 42px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s, background 0.2s;
    pointer-events: none;
    z-index: 50;
  }

  #totop:hover { background: var(--highlight); color: var(--accent); }
  #totop.show { opacity: 1; pointer-events: all; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    main { padding: 28px 24px 60px; }
  }

  @media (max-width: 768px) {
    aside {
      transform: translateX(-100%);
      transition: transform 0.25s;
      z-index: 90;
      width: 280px;
      min-width: 280px;
    }
    aside.open { transform: translateX(0); }
    main { margin-left: 0; padding: 20px 16px 60px; }
    .menu-btn { display: flex; align-items: center; justify-content: center; }
    .overlay {
      display: none;
      position: fixed;
      inset: 60px 0 0 0;
      background: rgba(0,0,0,0.5);
      z-index: 80;
    }
    .overlay.show { display: block; }
    .intro h1 { font-size: 1.6rem; }
    .stats { flex-wrap: wrap; gap: 16px; }
  }

  mark {
    background: rgba(79,156,249,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">Фармакология <span>60 тем</span></div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Поиск по темам и содержанию…" autocomplete="off" spellcheck="false">
  </div>
  <span class="search-count" id="search-count"></span>
  <button class="menu-btn" id="menu-btn" aria-label="Меню">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
  </button>
</header>

<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside id="sidebar">
    <div class="section-label">Содержание</div>
    <!-- nav items injected by JS -->
  </aside>

  <main>
    <div class="intro">
      <h1>Фармакология:<br><em>60 учебных тем</em></h1>
      <p>Развёрнутые ответы по всем разделам курса фармакологии. Используйте поиск или боковое меню для навигации.</p>
      <div class="stats">
        <div class="stat"><span class="stat-num">60</span><span class="stat-label">Тем</span></div>
        <div class="stat"><span class="stat-num">5</span><span class="stat-label">Разделов</span></div>
        <div class="stat"><span class="stat-num">∞</span><span class="stat-label">Удачи</span></div>
      </div>
    </div>

    <div id="topics-container"></div>
    <div class="no-results" id="no-results">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Ничего не найдено. Попробуйте другой запрос.</p>
    </div>
  </main>
</div>

<div id="totop" title="Наверх">
  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</div>

<script>
const topics = [
  {
    id: 1,
    title: "Введение в фармакологию. Виды лекарственных форм",
    body: `
<p>Фармакология — наука о взаимодействии лекарственных веществ с живыми организмами. Она изучает происхождение, физические и химические свойства препаратов, их действие на организм, способы применения и побочные эффекты.</p>
<h3>Основные разделы</h3>
<ul>
<li><strong>Фармакокинетика</strong> — что организм делает с лекарством (всасывание, распределение, метаболизм, выведение)</li>
<li><strong>Фармакодинамика</strong> — что лекарство делает с организмом (механизм и эффекты действия)</li>
<li><strong>Фармакотерапия</strong> — применение ЛС для лечения заболеваний</li>
<li><strong>Токсикология</strong> — изучение вредного действия веществ</li>
</ul>
<h3>Лекарственная форма</h3>
<p>Это удобное для применения состояние лекарственного средства, обеспечивающее нужный терапевтический эффект. Выбор формы определяет скорость наступления и продолжительность эффекта, биодоступность, удобство применения.</p>
<h3>Классификация лекарственных форм</h3>
<ul>
<li><strong>Твёрдые:</strong> таблетки, капсулы, порошки, гранулы, пилюли, драже</li>
<li><strong>Жидкие:</strong> растворы, настойки, настои, отвары, суспензии, эмульсии, сиропы</li>
<li><strong>Мягкие:</strong> мази, кремы, гели, пасты, суппозитории, пластыри</li>
<li><strong>Газообразные:</strong> аэрозоли, спреи, газы для ингаляций</li>
</ul>
<div class="drug-box"><div class="drug-label">Ключевые понятия</div><ul>
<li>Биодоступность — доля вещества, достигающая системного кровотока</li>
<li>Лекарственное средство (ЛС) — вещество или смесь веществ, применяемые для лечения/профилактики</li>
<li>Пролонгированные формы — обеспечивают длительный эффект (ретард-таблетки, депо-инъекции)</li>
</ul></div>`
  },
  {
    id: 2,
    title: "Твёрдые лекарственные формы. Преимущества и недостатки",
    body: `
<p>Твёрдые лекарственные формы — наиболее распространённая группа; их удобство, стабильность и точность дозирования делают их основой современной фармацевтики.</p>
<h3>Виды твёрдых форм</h3>
<ul>
<li><strong>Таблетки</strong> — спрессованные порошки; бывают простые, покрытые оболочкой, шипучие, жевательные, сублингвальные, кишечнорастворимые (энтеросолюбильные)</li>
<li><strong>Капсулы</strong> — твёрдые (желатиновые) и мягкие; маскируют вкус и запах</li>
<li><strong>Порошки</strong> — наибольшая площадь поверхности → быстрое всасывание</li>
<li><strong>Гранулы</strong> — агрегированные порошки, лучше текут и дозируются</li>
<li><strong>Драже</strong> — таблетки, покрытые сахарной оболочкой послойно</li>
<li><strong>Пилюли</strong> — шарообразные, практически вышли из употребления</li>
</ul>
<h3>Преимущества</h3>
<ul>
<li>Точность дозирования</li>
<li>Длительный срок хранения</li>
<li>Удобство приёма и транспортировки</li>
<li>Возможность маскировки вкуса и запаха</li>
<li>Защита от желудочного сока (кишечнорастворимые покрытия)</li>
<li>Создание пролонгированного действия (ретард-формы)</li>
</ul>
<h3>Недостатки</h3>
<ul>
<li>Более медленное наступление эффекта по сравнению с инъекциями</li>
<li>Зависимость всасывания от рН ЖКТ, пищи, моторики кишечника</li>
<li>Первичное прохождение через печень (пресистемный метаболизм)</li>
<li>Невозможность применения при рвоте, нарушении глотания</li>
<li>Потенциальное раздражающее действие на слизистую ЖКТ</li>
</ul>`
  },
  {
    id: 3,
    title: "Жидкие лекарственные формы. Преимущества и недостатки",
    body: `
<p>Жидкие лекарственные формы — системы, в которых действующее вещество растворено или диспергировано в жидкой основе (вода, спирт, масло и др.).</p>
<h3>Виды жидких форм</h3>
<ul>
<li><strong>Растворы</strong> — истинные растворы (прозрачные): для приёма внутрь, инъекций, наружного применения</li>
<li><strong>Настои и отвары</strong> — водные вытяжки из растительного сырья</li>
<li><strong>Настойки</strong> — спиртовые вытяжки (концентрированные)</li>
<li><strong>Суспензии</strong> — нерастворимое вещество во взвешенном состоянии</li>
<li><strong>Эмульсии</strong> — системы масло/вода или вода/масло</li>
<li><strong>Сиропы</strong> — концентрированные растворы сахара с добавлением действующих веществ</li>
<li><strong>Экстракты</strong> — концентрированные вытяжки жидкие, густые, сухие</li>
</ul>
<h3>Преимущества</h3>
<ul>
<li>Быстрое всасывание и наступление эффекта</li>
<li>Удобно для детей и пожилых (без глотания твёрдых форм)</li>
<li>Возможность точного дозирования жидкостью (мерная ложка, шприц-дозатор)</li>
<li>Мягкое воздействие на ЖКТ (суспензии антацидов)</li>
<li>Возможность комбинирования нескольких веществ</li>
</ul>
<h3>Недостатки</h3>
<ul>
<li>Меньший срок хранения (риск гидролиза, микробного роста)</li>
<li>Неудобство транспортировки (хрупкость упаковки, вес)</li>
<li>Нестабильность суспензий и эмульсий (расслоение)</li>
<li>Неприятный вкус, который сложнее замаскировать</li>
<li>Требуют хранения в холодильнике (некоторые формы)</li>
</ul>`
  },
  {
    id: 4,
    title: "Мягкие лекарственные формы. Преимущества и недостатки",
    body: `
<p>Мягкие лекарственные формы — пластичные (вязкие) составы, предназначенные главным образом для местного применения. Основы: жировые (вазелин, ланолин), водорастворимые (ПЭГ), гидрофильные (гели).</p>
<h3>Виды мягких форм</h3>
<ul>
<li><strong>Мазь</strong> — содержание воды < 25%, однородная масса</li>
<li><strong>Крем</strong> — двухфазная система масло/вода, > 25% воды, более лёгкая текстура</li>
<li><strong>Гель</strong> — прозрачная гидрофильная основа (карбопол, метилцеллюлоза)</li>
<li><strong>Паста</strong> — мазь с ≥ 25% порошкообразных веществ (более густая)</li>
<li><strong>Суппозитории (свечи)</strong> — ректальные, вагинальные; тают при температуре тела</li>
<li><strong>Пластыри</strong> — трансдермальные системы доставки (ТТС)</li>
<li><strong>Линименты</strong> — жидкие мази</li>
</ul>
<h3>Преимущества</h3>
<ul>
<li>Местное действие без системных эффектов (при нанесении на кожу)</li>
<li>Пролонгированный контакт с поверхностью</li>
<li>Суппозитории: обход кишечного барьера и пресистемного метаболизма</li>
<li>Трансдермальные пластыри: равномерное поступление ЛС, длительное действие</li>
<li>Отсутствие проблем с глотанием</li>
</ul>
<h3>Недостатки</h3>
<ul>
<li>Загрязнение одежды, неудобство нанесения</li>
<li>Непостоянство всасывания через кожу (зависит от места, состояния кожи)</li>
<li>Ограниченная биодоступность при накожном применении</li>
<li>Риск местных аллергических реакций на основу</li>
<li>Суппозитории психологически неприемлемы для части пациентов</li>
</ul>`
  },
  {
    id: 5,
    title: "Пути введения лекарственных средств. Фармакокинетика",
    body: `
<p>Фармакокинетика описывает процессы всасывания (A), распределения (D), метаболизма (M) и выведения (E) — модель ADME.</p>
<h3>Энтеральные пути (через ЖКТ)</h3>
<ul>
<li><strong>Пероральный (per os)</strong> — наиболее распространён; удобен, но медленнее; зависит от pH, пищи, перистальтики</li>
<li><strong>Сублингвальный</strong> — под язык; быстрое всасывание, обход первичного метаболизма (нитроглицерин)</li>
<li><strong>Буккальный</strong> — в щёку/десну</li>
<li><strong>Ректальный</strong> — через прямую кишку; частично избегает метаболизма в печени</li>
</ul>
<h3>Парентеральные пути (минуя ЖКТ)</h3>
<ul>
<li><strong>Внутривенный (в/в)</strong> — мгновенный эффект, 100% биодоступность; риск эмболии, флебита</li>
<li><strong>Внутримышечный (в/м)</strong> — быстрее перорального, возможны болезненные инъекции</li>
<li><strong>Подкожный (п/к)</strong> — медленнее в/м; инсулин, вакцины</li>
<li><strong>Ингаляционный</strong> — лёгкие; быстрый эффект, местное и системное действие</li>
<li><strong>Трансдермальный</strong> — пластыри; медленное равномерное всасывание</li>
<li><strong>Интратекальный</strong> — в спинномозговой канал (анестезия, химиотерапия ЦНС)</li>
</ul>
<h3>Фармакокинетические параметры</h3>
<ul>
<li><strong>Биодоступность (F)</strong> — % вещества, достигающего системного кровотока</li>
<li><strong>Объём распределения (Vd)</strong> — кажущийся объём, в котором распределено ЛС</li>
<li><strong>Период полувыведения (T½)</strong> — время снижения концентрации на 50%</li>
<li><strong>Клиренс (Cl)</strong> — объём плазмы, очищаемый от ЛС в единицу времени</li>
<li><strong>Связывание с белками плазмы</strong> — влияет на свободную (активную) фракцию</li>
</ul>
<h3>Метаболизм</h3>
<p>Главный орган — печень. Фазы: I (окисление, восстановление, гидролиз — цитохром P450) и II (конъюгация). Эффект первого прохождения снижает биодоступность пероральных форм. Концепция «пролекарства» — вещество становится активным после метаболизма.</p>`
  },
  {
    id: 6,
    title: "Фармакодинамика. Факторы, влияющие на действие лекарственных средств",
    body: `
<p>Фармакодинамика изучает механизм действия ЛС на организм и его органы. Большинство ЛС действуют через специфические молекулярные мишени.</p>
<h3>Мишени для лекарств</h3>
<ul>
<li><strong>Рецепторы</strong> — белки, специфически связывающие ЛС (агонист активирует, антагонист блокирует)</li>
<li><strong>Ферменты</strong> — ингибиторы (ингибиторы АПФ, ингибиторы ЦОГ)</li>
<li><strong>Ионные каналы</strong> — блокаторы кальциевых, натриевых каналов</li>
<li><strong>Транспортёры</strong> — ингибиторы обратного захвата (антидепрессанты)</li>
<li><strong>Нуклеиновые кислоты</strong> — антибиотики, противоопухолевые препараты</li>
</ul>
<h3>Концепция доза–эффект</h3>
<p>С увеличением дозы эффект возрастает до максимального (Emax). EC50 — концентрация, вызывающая 50% максимального эффекта. Терапевтический индекс (ТИ) = TD50/ED50; чем выше ТИ, тем безопаснее препарат.</p>
<h3>Факторы, влияющие на действие ЛС</h3>
<ul>
<li><strong>Возраст:</strong> у детей — незрелость ферментных систем; у пожилых — снижение функции почек и печени, изменение состава тела</li>
<li><strong>Масса тела и состав тела:</strong> влияет на распределение липофильных/гидрофильных веществ</li>
<li><strong>Пол:</strong> гормональные различия → разный метаболизм</li>
<li><strong>Генетические факторы (фармакогенетика):</strong> полиморфизмы CYP2D6, CYP2C19 и других ферментов</li>
<li><strong>Патология органов:</strong> почечная и печёночная недостаточность меняют фармакокинетику</li>
<li><strong>Беременность:</strong> изменение объёма распределения, метаболизма, риск тератогенности</li>
<li><strong>Приём пищи:</strong> замедляет или ускоряет всасывание; грейпфрут ингибирует CYP3A4</li>
<li><strong>Лекарственные взаимодействия</strong></li>
</ul>`
  },
  {
    id: 7,
    title: "Виды действия ЛС. Местное, системное и избирательное действие",
    body: `
<p>Классификация видов действия ЛС позволяет прогнозировать их клинические эффекты и выбирать оптимальный путь введения.</p>
<h3>Местное действие</h3>
<p>Реализуется в месте контакта ЛС с тканями до его всасывания. Типичные примеры: местные анестетики при нанесении на кожу/слизистые, антисептики, вяжущие вещества. Основная цель — минимальное системное воздействие.</p>
<h3>Системное (резорбтивное) действие</h3>
<p>Реализуется после всасывания ЛС в кровь и его распределения по органам и тканям. Большинство ЛС действует системно. Системный эффект может быть нежелательным при местном применении (例: кортикостероиды в мазях при длительном использовании).</p>
<h3>Избирательное (элективное) действие</h3>
<p>Некоторые ЛС преимущественно накапливаются или действуют на определённые органы или ткани. Причины: высокая плотность специфических рецепторов, особенности кровоснабжения, накопление в органе. Примеры:</p>
<ul>
<li>Йод — щитовидная железа</li>
<li>Сердечные гликозиды — миокард</li>
<li>Изониазид — микобактерии туберкулёза</li>
<li>β-адреноблокаторы (кардиоселективные) — β1-рецепторы сердца</li>
</ul>
<p>Абсолютной избирательности не существует — при высоких дозах появляются эффекты на других органах (дозозависимая утрата селективности).</p>`
  },
  {
    id: 8,
    title: "Виды действия ЛС. Прямое и непрямое, обратимое и необратимое действие",
    body: `
<h3>Прямое (первичное) действие</h3>
<p>ЛС непосредственно взаимодействует с мишенью в органе или ткани. Пример: адреналин → прямое возбуждение α- и β-адренорецепторов сердца и сосудов.</p>
<h3>Непрямое (косвенное, рефлекторное) действие</h3>
<p>Эффект возникает опосредованно, через нервные или гуморальные механизмы. Виды:</p>
<ul>
<li><strong>Нейрорефлекторное</strong> — раздражение рецепторов → рефлекторная реакция (горчичники → рефлекторное расширение сосудов внутренних органов)</li>
<li><strong>Гуморальное непрямое</strong> — через изменение концентрации медиаторов/гормонов</li>
</ul>
<h3>Обратимое действие</h3>
<p>Связь ЛС с мишенью нековалентная; после прекращения действия препарата функция восстанавливается. Большинство ЛС действует обратимо. Примеры: местные анестетики, бета-блокаторы, антагонисты рецепторов гистамина.</p>
<h3>Необратимое действие</h3>
<p>Ковалентное связывание с мишенью или её разрушение. Функция не восстанавливается — требуется синтез новых молекул мишени. Примеры:</p>
<ul>
<li>Аспирин — необратимое ингибирование ЦОГ тромбоцитов (ацетилирование) на весь срок жизни тромбоцита (~10 дней)</li>
<li>Фосфорорганические соединения — необратимое ингибирование ацетилхолинэстеразы</li>
<li>Алкилирующие противоопухолевые препараты — ковалентные сшивки с ДНК</li>
</ul>`
  },
  {
    id: 9,
    title: "Виды действия ЛС. Основное и побочное действие",
    body: `
<h3>Основное (главное) действие</h3>
<p>Терапевтически значимый эффект, ради которого препарат применяется в данной клинической ситуации. Один и тот же препарат может иметь разные «основные» эффекты при различных показаниях.</p>
<p>Пример: аспирин — основное действие может быть жаропонижающим, противовоспалительным или антиагрегантным в зависимости от цели назначения.</p>
<h3>Побочное действие</h3>
<p>Нежелательные эффекты, возникающие при применении ЛС в терапевтических дозах. Виды:</p>
<ul>
<li><strong>Связанные с фармакодинамикой (тип А)</strong> — предсказуемые, дозозависимые; пример: сухость во рту у м-холиноблокаторов</li>
<li><strong>Идиосинкразические (тип В)</strong> — непредсказуемые, не связаны с дозой; часто иммунологические (аллергические реакции, анафилаксия)</li>
<li><strong>Тератогенные</strong> — поражение плода при приёме во время беременности</li>
<li><strong>Мутагенные</strong> — изменение генетического аппарата</li>
<li><strong>Канцерогенные</strong> — провоцируют опухолевый рост</li>
<li><strong>Токсические</strong> — возникают при передозировке или при нарушении выведения</li>
</ul>
<h3>Нежелательные лекарственные реакции (НЛР)</h3>
<p>ВОЗ определяет НЛР как вредный и непреднамеренный эффект, возникающий при нормальных дозах для лечения, диагностики или профилактики. Фармаконадзор (pharmacovigilance) — система мониторинга безопасности ЛС после регистрации.</p>`
  },
  {
    id: 10,
    title: "Виды лекарственной терапии",
    body: `
<p>Лекарственная терапия классифицируется по цели воздействия и характеру взаимодействия ЛС с патологическим процессом.</p>
<h3>По цели назначения</h3>
<ul>
<li><strong>Этиотропная</strong> — устраняет причину болезни (антибиотики при инфекциях, противогельминтные препараты)</li>
<li><strong>Патогенетическая</strong> — прерывает патогенетические звенья (ИАПФ при АГ, противовоспалительные при артрите)</li>
<li><strong>Симптоматическая</strong> — устраняет симптомы, не влияя на причину (анальгетики, жаропонижающие)</li>
<li><strong>Заместительная</strong> — компенсирует дефицит эндогенных веществ (инсулин при СД, тиреоидные гормоны)</li>
</ul>
<h3>По характеру течения</h3>
<ul>
<li><strong>Острая (неотложная)</strong> — применение ЛС при острых состояниях (адреналин при анафилаксии)</li>
<li><strong>Поддерживающая (хроническая)</strong> — длительный приём (статины, антигипертензивные)</li>
<li><strong>Профилактическая</strong> — предупреждение заболеваний (вакцины, антималярийные препараты)</li>
<li><strong>Паллиативная</strong> — уменьшение страданий при неизлечимых заболеваниях</li>
</ul>
<h3>Принципы рациональной фармакотерапии</h3>
<ul>
<li>Выбор ЛС с доказанной эффективностью</li>
<li>Минимально необходимая доза и длительность курса</li>
<li>Мониторинг эффективности и безопасности</li>
<li>Учёт индивидуальных особенностей пациента</li>
</ul>`
  },
  {
    id: 11,
    title: "Взаимодействие лекарственных средств",
    body: `
<p>Взаимодействие ЛС — изменение фармакологического эффекта одного препарата под влиянием другого. Клинически значимо у пациентов, принимающих ≥ 5 препаратов (полипрагмазия).</p>
<h3>Фармакокинетические взаимодействия</h3>
<ul>
<li><strong>Всасывание:</strong> антациды снижают всасывание фторхинолонов и тетрациклинов (хелатирование)</li>
<li><strong>Белковое связывание:</strong> варфарин вытесняется НПВС → усиление антикоагулянтного эффекта</li>
<li><strong>Метаболизм:</strong> индукторы (рифампицин, фенитоин) ускоряют метаболизм → снижение эффекта; ингибиторы (кетоконазол, грейпфрутовый сок) замедляют → усиление токсичности</li>
<li><strong>Выведение:</strong> ощелачивание мочи увеличивает выведение слабых кислот (аспирин)</li>
</ul>
<h3>Фармакодинамические взаимодействия</h3>
<ul>
<li><strong>Синергизм:</strong> суммация (1+1=2) или потенцирование (1+1>2) эффектов; пример: наркотические анальгетики + бензодиазепины → усиление угнетения ЦНС</li>
<li><strong>Антагонизм:</strong> конкурентный (налоксон vs опиоиды), неконкурентный, физиологический (инсулин/глюкагон)</li>
</ul>
<h3>Клинически важные сочетания</h3>
<ul>
<li>Варфарин + НПВС → повышенный риск кровотечений</li>
<li>ИАПФ + калийсберегающие диуретики → гиперкалиемия</li>
<li>Статины + фибраты → риск рабдомиолиза</li>
<li>ИМАО + серотонинергические ЛС → серотониновый синдром</li>
</ul>`
  },
  {
    id: 12,
    title: "Местные анестетики",
    body: `
<p>Местные анестетики (МА) блокируют проведение нервного импульса путём обратимой блокады натриевых каналов нейрональных мембран, прекращая генерацию и распространение потенциала действия.</p>
<h3>Классификация по химической структуре</h3>
<ul>
<li><strong>Эфиры (быстро гидролизуются холинэстеразой):</strong> прокаин (новокаин), тетракаин, бензокаин (анестезин), кокаин</li>
<li><strong>Амиды (метаболизируются в печени, дольше действуют):</strong> лидокаин, мепивакаин, бупивакаин, ропивакаин, артикаин (ультракаин)</li>
</ul>
<h3>Механизм действия</h3>
<p>Блокируют потенциалзависимые Na⁺-каналы в состоянии активации/инактивации. Чем тоньше волокно и меньше миелин — тем быстрее блокируется. Порядок блокады: болевые (С, Аδ) → температурные → тактильные → двигательные.</p>
<h3>Виды анестезии</h3>
<ul>
<li><strong>Поверхностная (аппликационная)</strong> — на слизистые, кожу (бензокаин, тетракаин)</li>
<li><strong>Инфильтрационная</strong> — послойное пропитывание тканей (новокаин, лидокаин)</li>
<li><strong>Проводниковая</strong> — блок нерва (лидокаин, бупивакаин)</li>
<li><strong>Спинномозговая</strong> — в субарахноидальное пространство</li>
<li><strong>Эпидуральная</strong> — в эпидуральное пространство (ропивакаин)</li>
</ul>
<div class="drug-box"><div class="drug-label">Препараты</div><ul>
<li>Лидокаин — универсальный МА, также антиаритмик</li>
<li>Бупивакаин — длительное действие (4–8 ч), кардиотоксичен в высоких дозах</li>
<li>Артикаин — широко применяется в стоматологии</li>
<li>Прокаин — короткое действие, высокий риск аллергии</li>
</ul></div>`
  },
  {
    id: 13,
    title: "Вяжущие лекарственные средства",
    body: `
<p>Вяжущие вещества вызывают коагуляцию белков поверхностного слоя слизистой или кожи, образуя защитную плёнку, уменьшая боль, воспаление и выделения.</p>
<h3>Механизм действия</h3>
<p>Взаимодействуют с белками тканевой жидкости и поверхностными белками клеток → денатурация → уплотнение поверхностного слоя. Уменьшают проницаемость капилляров, снижают отёк, болевую чувствительность. При этом живая ткань не разрушается.</p>
<h3>Классификация</h3>
<ul>
<li><strong>Неорганические (минеральные):</strong> висмута нитрат основной, квасцы (алюминия сульфат), свинца ацетат, цинка сульфат, серебра нитрат (ляпис)</li>
<li><strong>Органические (растительные):</strong> танин, препараты коры дуба, корня бадана, ромашки, зверобоя, черники, черёмухи (содержат дубильные вещества — таннины)</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Воспалительные заболевания слизистой ЖКТ (стоматиты, гингивиты, колиты)</li>
<li>Диарея (вяжущее действие в кишечнике)</li>
<li>Кожные заболевания (дерматиты, ожоги — местно)</li>
<li>Отравление солями тяжёлых металлов (танин образует нерастворимые соединения)</li>
</ul>
<div class="drug-box"><div class="drug-label">Препараты</div><ul>
<li>Танин — 1–2% р-р наружно, полоскания</li>
<li>Отвар коры дуба — полоскание горла, полости рта</li>
<li>Висмута субнитрат — в составе антидиарейных средств</li>
</ul></div>`
  },
  {
    id: 14,
    title: "Обволакивающие лекарственные препараты",
    body: `
<p>Обволакивающие вещества образуют на поверхности слизистых оболочек защитный коллоидный слой, механически защищая ткани от раздражающих воздействий.</p>
<h3>Механизм действия</h3>
<p>Коллоидные вещества растворяются в воде, образуя слизистые растворы, которые покрывают слизистую оболочку равномерным слоем, препятствуя контакту раздражителей с рецепторами. Не оказывают химического действия на ткани.</p>
<h3>Классификация</h3>
<ul>
<li><strong>Растительного происхождения:</strong> семена льна (слизь), крахмал (слизь), алтей (корень), слизь из овса</li>
<li><strong>Синтетические/полусинтетические:</strong> альмагель, фосфалюгель, карбоксиметилцеллюлоза</li>
<li><strong>Минеральные:</strong> магния трисиликат</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Острые воспаления ЖКТ (гастриты, колиты)</li>
<li>Язвенная болезнь желудка и 12-перстной кишки (в составе комплексной терапии)</li>
<li>Защита при отравлениях (обволакивают ЖКТ, замедляют всасывание яда)</li>
<li>Заболевания дыхательных путей (муколитические «мягкие» смеси)</li>
</ul>
<p>Важно: обволакивающие средства могут снижать всасывание других ЛС → принимать с интервалом 1–2 ч.</p>`
  },
  {
    id: 15,
    title: "Адсорбирующие лекарственные средства",
    body: `
<p>Адсорбенты — инертные вещества с высокой поверхностной активностью, связывающие на своей поверхности токсины, газы, микроорганизмы и другие вредные вещества в просвете ЖКТ, препятствуя их всасыванию.</p>
<h3>Механизм действия</h3>
<p>Физическая адсорбция (а не химическое связывание): ЛС не всасываются, выводятся с калом вместе с адсорбированными веществами. Эффективны при пероральном приёме только в ЖКТ.</p>
<h3>Виды адсорбентов</h3>
<ul>
<li><strong>Активированный уголь</strong> — наиболее универсален; 1 г адсорбирует несколько граммов яда</li>
<li><strong>Диоксид кремния (Полисорб)</strong> — высокая адсорбционная ёмкость</li>
<li><strong>Смектит диоктаэдрический (Смекта)</strong> — также оказывает защитное действие на слизистую</li>
<li><strong>Энтеросгель (полиметилсилоксан)</strong> — связывает токсины при сохранении питательных веществ</li>
<li><strong>Холестирамин</strong> — анионообменная смола; связывает желчные кислоты (гиполипидемическое)</li>
<li><strong>Лигнин гидролизный (Полифепан)</strong> — природный энтеросорбент</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Острые отравления (алкоголь, лекарства, пищевые токсины)</li>
<li>Кишечные инфекции, диарея</li>
<li>Метеоризм (газы)</li>
<li>Хроническая почечная недостаточность (уремические токсины)</li>
</ul>
<p>Принимают между приёмами пищи и других ЛС (интервал ≥ 2 ч), запивая большим количеством воды.</p>`
  },
  {
    id: 16,
    title: "Раздражающие лекарственные препараты",
    body: `
<p>Раздражающие вещества при нанесении на кожу или слизистые вызывают раздражение чувствительных нервных окончаний → рефлекторные реакции в органах и тканях (трофические, сосудистые, болеутоляющие эффекты).</p>
<h3>Механизм действия</h3>
<p>Активация ноцицепторов и терморецепторов кожи → рефлекторное расширение сосудов внутренних органов (сегментарный рефлекс) → улучшение кровоснабжения, снижение болевой импульсации из внутренних органов. Также вырабатываются эндорфины, простагландины.</p>
<h3>Классификация</h3>
<ul>
<li><strong>Растительные:</strong> горчичники (горчичное масло — аллилизотиоцианат), ментол (масло мяты), камфора, скипидар, красный перец (капсаицин)</li>
<li><strong>Синтетические:</strong> финалгон (нонивамид + никобоксил), апизартрон (пчелиный яд)</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Заболевания дыхательных путей (бронхиты, пневмония) — горчичники на грудную клетку</li>
<li>Боли в мышцах и суставах (миозиты, артралгии, невралгии)</li>
<li>Нарушения периферического кровообращения</li>
<li>Ринит (ментол — местно)</li>
</ul>
<div class="drug-box"><div class="drug-label">Препараты</div><ul>
<li>Капсикам мазь — синтетический аналог капсаицина</li>
<li>Никофлекс — рефлекторное расширение сосудов при миозите</li>
<li>Меновазин — ментол + бензокаин (охлаждающий + анестезирующий эффект)</li>
</ul></div>`
  },
  {
    id: 17,
    title: "ЛС, влияющие на холинергические рецепторы",
    body: `
<p>Холинергическая система использует ацетилхолин (АХ) в качестве медиатора. Действие осуществляется через мускариновые (М) и никотиновые (Н) рецепторы.</p>
<h3>Типы холинорецепторов</h3>
<ul>
<li><strong>М-холинорецепторы (мускариновые)</strong> — в парасимпатических эффекторных органах, ЦНС: М1 (нейроны), М2 (сердце), М3 (гладкие мышцы, железы)</li>
<li><strong>Н-холинорецепторы (никотиновые)</strong> — в ганглиях (Нн), нейромышечных синапсах (Нм), хромаффинных клетках, каротидном клубочке</li>
</ul>
<h3>Классификация ЛС</h3>
<ul>
<li><strong>Холиномиметики (активаторы):</strong> М-холиномиметики (пилокарпин), Н-холиномиметики (лобелин, цитизин), М,Н-холиномиметики (ацетилхолин, карбахол)</li>
<li><strong>Антихолинэстеразные</strong> — непрямые холиномиметики (неостигмин, пиридостигмин)</li>
<li><strong>Холиноблокаторы:</strong> М-холиноблокаторы (атропин, скополамин, ипратропий), Н-холиноблокаторы ганглиоблокаторы (гексаметоний) и миорелаксанты (тубокурарин, суксаметоний)</li>
</ul>
<h3>Физиологические эффекты АХ</h3>
<ul>
<li>Сердце: брадикардия, снижение AV-проводимости (М2)</li>
<li>Железы: усиление секреции слюны, пота, бронхиальной слизи (М3)</li>
<li>ЖКТ: усиление перистальтики, расслабление сфинктеров (М3)</li>
<li>Глаз: миоз (М3 — круговая мышца), спазм аккомодации</li>
</ul>`
  },
  {
    id: 18,
    title: "Холиномиметики",
    body: `
<p>Холиномиметики — вещества, воспроизводящие эффекты ацетилхолина, действуя на М- и/или Н-холинорецепторы.</p>
<h3>М-холиномиметики</h3>
<p><strong>Пилокарпин</strong> — растительный алкалоид; сужает зрачок (миоз), снижает внутриглазное давление (ВГД). Применяют при глаукоме (капли). Также стимулирует слюно- и потоотделение.</p>
<p><strong>Бетанехол, цевимелин</strong> — синтетические; применяют при атонии мочевого пузыря и синдроме Шегрена (ксеростомия).</p>
<h3>М,Н-холиномиметики</h3>
<p><strong>Ацетилхолин</strong> — эндогенный медиатор; используют в офтальмологии для интраокулярного введения. Кратковременный эффект из-за быстрого гидролиза.</p>
<p><strong>Карбахол</strong> — устойчив к холинэстеразе; местно в офтальмологии.</p>
<h3>Н-холиномиметики</h3>
<p><strong>Никотин</strong> — алкалоид табака; стимулирует ганглии, хромаффинные клетки. В малых дозах — психостимуляция, в больших — угнетение, паралич.</p>
<p><strong>Лобелин, цитизин (Табекс)</strong> — стимулируют Н-рецепторы каротидного синуса → рефлекторная активация дыхания. Применяют для отказа от курения (замещают никотин).</p>
<h3>Показания</h3>
<ul>
<li>Глаукома (пилокарпин)</li>
<li>Ксеростомия при синдроме Шегрена</li>
<li>Атония мочевого пузыря/кишечника</li>
<li>Лечение никотиновой зависимости</li>
</ul>`
  },
  {
    id: 19,
    title: "Антихолинэстеразные лекарственные средства",
    body: `
<p>Антихолинэстеразные (АХЭ) средства ингибируют ацетилхолинэстеразу — фермент, разрушающий АХ. В результате АХ накапливается в синапсах и усиливает холинергические эффекты (непрямые холиномиметики).</p>
<h3>Классификация</h3>
<ul>
<li><strong>Обратимые ингибиторы:</strong> неостигмин (прозерин), пиридостигмин, галантамин, физостигмин, донепезил, ривастигмин</li>
<li><strong>Необратимые ингибиторы:</strong> фосфорорганические соединения — боевые отравляющие вещества (зарин, VX), инсектициды (хлорофос, дихлофос)</li>
</ul>
<h3>Фармакологические эффекты</h3>
<ul>
<li>М-эффекты: миоз, брадикардия, усиление секреции желёз, спазм бронхов, усиление перистальтики</li>
<li>Н-эффекты: усиление нейромышечной передачи → повышение тонуса скелетных мышц</li>
<li>ЦНС: улучшение памяти и когнитивных функций (донепезил при болезни Альцгеймера)</li>
</ul>
<h3>Применение</h3>
<ul>
<li>Миастения gravis (неостигмин, пиридостигмин)</li>
<li>Болезнь Альцгеймера (донепезил, ривастигмин, галантамин)</li>
<li>Послеоперационная атония кишечника и мочевого пузыря (неостигмин)</li>
<li>Устранение действия недеполяризующих миорелаксантов (прозерин)</li>
<li>Антидот при отравлении атропином (физостигмин)</li>
</ul>
<div class="drug-box"><div class="drug-label">Антидот при ФОС-отравлении</div><ul>
<li>Атропин — устраняет М-эффекты</li>
<li>Реактиваторы холинэстеразы: пралидоксим (2-PAM), дипироксим — восстанавливают фермент при раннем введении</li>
</ul></div>`
  },
  {
    id: 20,
    title: "Холиноблокаторы",
    body: `
<p>Холиноблокаторы конкурентно блокируют холинорецепторы, предотвращая связывание ацетилхолина.</p>
<h3>М-холиноблокаторы (антимускариновые)</h3>
<p>Блокируют М1, М2, М3 рецепторы. Эффекты (по органам):</p>
<ul>
<li>Глаз: мидриаз, паралич аккомодации (циклоплегия)</li>
<li>Сердце: тахикардия (блок М2)</li>
<li>Секреция: угнетение слюны, пота, бронхиального секрета, желудочного сока</li>
<li>ЖКТ: снижение перистальтики (спазмолиз), расслабление сфинктеров</li>
<li>Бронхи: бронходилатация</li>
</ul>
<p><strong>Атропин</strong> — эталонный М-холиноблокатор; применяют при брадикардии, спазмах ЖКТ, перед наркозом, при отравлении ФОС. <strong>Скополамин</strong> — более выражен ЦНС-эффект; транспортные патчи при укачивании. <strong>Ипратропий</strong> — ингаляционный бронхолитик. <strong>Тропикамид, циклопентолат</strong> — офтальмология (мидриаз).</p>
<h3>Ганглиоблокаторы (Нн-блокаторы)</h3>
<p>Блокируют все вегетативные ганглии → гипотензия, тахикардия, атония ЖКТ. Применяли для управляемой гипотонии (гигроний, пентамин). Бензогексоний — при гипертоническом кризе.</p>
<h3>Миорелаксанты (Нм-блокаторы)</h3>
<ul>
<li><strong>Недеполяризующие:</strong> тубокурарин, атракурий, рокуроний, векуроний — блокируют рецептор, устраняются прозерином</li>
<li><strong>Деполяризующие:</strong> суксаметоний (дитилин) — сначала деполяризация (фасцикуляции), затем паралич; не устраняется прозерином</li>
</ul>`
  },
  {
    id: 21,
    title: "Средства, влияющие на адренергические рецепторы",
    body: `
<p>Адренергическая система использует норадреналин (синапсы СНС) и адреналин (мозговое вещество надпочечников) в качестве медиаторов.</p>
<h3>Типы адренорецепторов</h3>
<ul>
<li><strong>α1</strong> — постсинаптические в сосудах → вазоконстрикция, мидриаз, повышение тонуса сфинктеров</li>
<li><strong>α2</strong> — пресинаптические (ауторецепторы) → тормозят выброс НА; также в ЦНС → снижение АД</li>
<li><strong>β1</strong> — сердце → хронотропный+ и инотропный+</li>
<li><strong>β2</strong> — лёгкие → бронходилатация; матка → релаксация; сосуды мышц → вазодилатация</li>
<li><strong>β3</strong> — жировая ткань → липолиз</li>
</ul>
<h3>Классификация ЛС</h3>
<ul>
<li><strong>Адреномиметики:</strong> α+β (адреналин, норадреналин), α1 (фенилэфрин), α2 (клонидин, метилдопа), β (изопреналин), β1 (добутамин), β2 (сальбутамол, тербуталин), β1+β2 неселективные</li>
<li><strong>Адреноблокаторы:</strong> α1 (доксазозин, празозин), α (фентоламин), β1 (метопролол, бисопролол), β1+β2 (пропранолол, надолол), α+β (карведилол, лабеталол)</li>
<li><strong>Симпатолитики:</strong> резерпин, гуанетидин — нарушают выброс НА</li>
</ul>`
  },
  {
    id: 22,
    title: "Адреномиметики",
    body: `
<p>Адреномиметики активируют адренорецепторы, воспроизводя или усиливая эффекты симпатической нервной системы.</p>
<h3>α,β-адреномиметики</h3>
<p><strong>Адреналин (эпинефрин)</strong> — активирует все адренорецепторы. β1: тахикардия, усиление сократимости; β2: бронходилатация, вазодилатация мышц; α1: вазоконстрикция, мидриаз. Применяют при анафилаксии, остановке сердца, с МА (удлинение действия анестезии).</p>
<p><strong>Норадреналин</strong> — преобладают α-эффекты → выраженная вазоконстрикция и повышение АД. Применяют при гипотонии и шоке (в/в капельно).</p>
<h3>α1-адреномиметики</h3>
<p><strong>Фенилэфрин (мезатон)</strong> — вазоконстрикция; деконгестант (нафазолин, оксиметазолин) при насморке.</p>
<h3>α2-адреномиметики (центральные)</h3>
<p><strong>Клонидин</strong> — возбуждает α2-рецепторы ЦНС → снижение симпатического тонуса → гипотензия, брадикардия. Применяют при АГ, синдроме отмены опиоидов. <strong>Метилдопа</strong> — при АГ беременных.</p>
<h3>β2-адреномиметики (бронходилататоры)</h3>
<p>Короткодействующие (КДБА): <strong>сальбутамол (вентолин)</strong>, <strong>фенотерол</strong> — купирование бронхоспазма. Длительнодействующие (ДДБА): <strong>формотерол, сальметерол</strong> — базовая терапия ХОБЛ/астмы.</p>
<h3>β1-адреномиметики</h3>
<p><strong>Добутамин</strong> — инотропный эффект при острой сердечной недостаточности.</p>`
  },
  {
    id: 23,
    title: "Адреноблокаторы",
    body: `
<p>Адреноблокаторы конкурентно блокируют адренорецепторы, снижая влияние катехоламинов.</p>
<h3>β-адреноблокаторы</h3>
<p><strong>Пропранолол</strong> (неселективный β1+β2) — снижает ЧСС, АД, сократимость сердца; бронхоспазм у астматиков. <strong>Метопролол, бисопролол, атенолол</strong> — кардиоселективные β1-блокаторы → меньше риск бронхоспазма.</p>
<p>Эффекты: гипотензия, отрицательный хронотропный и инотропный эффекты, антиаритмия, снижение ВГД (тимолол).</p>
<p>Показания: АГ, ИБС, хроническая СН (с осторожным титрованием: карведилол, метопролол, бисопролол), аритмии, тиреотоксикоз, мигрень (профилактика), тревожность.</p>
<h3>α-адреноблокаторы</h3>
<p><strong>Празозин, доксазозин, теразозин</strong> — α1-блокаторы; снижают АД (постуральная гипотония!), применяют при АГ, ДГПЖ. <strong>Тамсулозин</strong> — уроселективный α1А — ДГПЖ. <strong>Фентоламин</strong> — неселективный α-блокатор; феохромоцитома, тест Регитина.</p>
<h3>α+β-блокаторы</h3>
<p><strong>Карведилол</strong> — α1+β; при СН, АГ. <strong>Лабеталол</strong> — при АГ беременных и гипертонических кризах.</p>
<h3>Нежелательные эффекты β-блокаторов</h3>
<ul>
<li>Брадикардия, AV-блокада</li>
<li>Бронхоспазм (неселективные)</li>
<li>Маскировка гипогликемии у диабетиков</li>
<li>Холодные конечности (вазоконстрикция)</li>
<li>Синдром отмены при резкой отмене</li>
</ul>`
  },
  {
    id: 24,
    title: "Симпатолитики и симпатомиметики",
    body: `
<h3>Симпатолитики</h3>
<p>Вещества, снижающие или устраняющие передачу возбуждения в адренергических синапсах путём нарушения синтеза, хранения, высвобождения или захвата медиатора (НА).</p>
<ul>
<li><strong>Резерпин</strong> — истощает запасы НА в везикулах (VMАТ-блокатор); гипотензия, брадикардия, депрессия (НЛР). Применялся при АГ, сейчас редко</li>
<li><strong>Гуанетидин</strong> — нарушает высвобождение НА; сильная гипотензия</li>
<li><strong>Октадин</strong> — аналогичный механизм</li>
</ul>
<h3>Симпатомиметики (непрямые адреномиметики)</h3>
<p>Усиливают высвобождение НА из везикул или блокируют его обратный захват — тем самым усиливают адренергическую передачу без прямого связывания с рецепторами.</p>
<ul>
<li><strong>Эфедрин</strong> — усиливает высвобождение НА + прямое слабое действие на рецепторы; бронхолитик, деконгестант, вазопрессор; толерантность развивается быстро</li>
<li><strong>Амфетамин</strong> — мощный высвободитель НА и DA; психостимулятор; высокий потенциал зависимости</li>
<li><strong>Тирамин</strong> — эндогенный симпатомиметик в пище (сыр, красное вино); при приёме ИМАО → гипертонический криз («сырный эффект»)</li>
</ul>`
  },
  {
    id: 25,
    title: "Дофаминергические ЛС",
    body: `
<p>Дофамин (DA) — нейромедиатор, действующий через D1–D5 рецепторы. Участвует в регуляции движений, мотивации, вознаграждения, гормонального фона (пролактин), АД.</p>
<h3>Дофаминомиметики</h3>
<ul>
<li><strong>Дофамин</strong> — D1-рецепторы почечных сосудов (вазодилатация, натрийурез при малых дозах); β1 (инотропный эффект при средних); α (вазоконстрикция при высоких). Применяют при шоке и острой СН</li>
<li><strong>Агонисты D2-рецепторов при болезни Паркинсона:</strong> прамипексол, ропинирол, каберголин, бромокриптин</li>
<li><strong>Агонисты D2 для снижения пролактина:</strong> бромокриптин, каберголин</li>
<li><strong>Леводопа (L-DOPA)</strong> — предшественник дофамина; проходит через ГЭБ, декарбоксилируется до DA; основа лечения болезни Паркинсона; применяют с карбидопой (ингибитор периферической ДОФА-декарбоксилазы)</li>
</ul>
<h3>Дофаминоблокаторы</h3>
<ul>
<li><strong>Нейролептики (антипсихотики)</strong> — блокируют D2-рецепторы мезолимбической системы → антипсихотический эффект; в нигростриатном пути → экстрапирамидные нарушения</li>
<li><strong>Метоклопрамид</strong> — D2-блокатор ЖКТ и триггерной зоны → прокинетик + противорвотный</li>
<li><strong>Домперидон</strong> — не проникает через ГЭБ; прокинетик без ЦНС-эффектов</li>
</ul>`
  },
  {
    id: 26,
    title: "Средства для наркоза",
    body: `
<p>Общая анестезия — обратимое угнетение ЦНС, сопровождающееся потерей сознания, анальгезией, амнезией и мышечным расслаблением.</p>
<h3>Теории наркоза</h3>
<p>Липидная теория (Мейер–Овертон): корреляция между растворимостью в липидах и анестетической мощностью. Белковая теория: взаимодействие с мембранными белками (Na⁺, K⁺, GABAA-рецепторы, NMDA-рецепторы).</p>
<h3>Ингаляционные анестетики</h3>
<ul>
<li><strong>Газы:</strong> закись азота (N₂O) — слабый анестетик, мощный анальгетик; ксенон — инертный, нейропротективный</li>
<li><strong>Галогенированные:</strong> изофлуран, севофлуран, десфлуран — усиливают GABA-а-рецепторы, блокируют NMDA-рецепторы; «минимальная альвеолярная концентрация» (МАК) — мера мощности</li>
</ul>
<h3>Внутривенные анестетики</h3>
<ul>
<li><strong>Пропофол</strong> — короткодействующий, быстрый выход, тотальная в/в анестезия (TIVA)</li>
<li><strong>Кетамин</strong> — антагонист NMDA; диссоциативная анестезия, выраженная анальгезия, бронходилатация</li>
<li><strong>Тиопентал натрия</strong> — барбитурат; ультракороткий; для индукции</li>
<li><strong>Этомидат</strong> — минимальное влияние на гемодинамику; при нестабильном пациенте</li>
<li><strong>Мидазолам</strong> — бензодиазепин; премедикация, седация</li>
</ul>
<h3>Стадии наркоза (классические по Гведелу)</h3>
<ol>
<li>Анальгезия (сохранено сознание)</li>
<li>Возбуждение (потеря коркового контроля)</li>
<li>Хирургический наркоз (4 уровня)</li>
<li>Агональная стадия (остановка дыхания)</li>
</ol>`
  },
  {
    id: 27,
    title: "Снотворные средства",
    body: `
<p>Снотворные — ЛС, облегчающие засыпание и/или увеличивающие продолжительность сна. Должны воспроизводить физиологическую структуру сна (NREM + REM фазы).</p>
<h3>Бензодиазепины</h3>
<p>Усиливают действие ГАМК на ГАМКА-рецепторы → ↑ частоты открытия Cl⁻-каналов → гиперполяризация нейронов. Снотворный + анксиолитический + противосудорожный + миорелаксирующий эффекты. Нитразепам, триазолам, темазепам. НЛР: дневная седация, зависимость, синдром отмены («рикошетная бессонница»).</p>
<h3>Z-препараты (небензодиазепиновые агонисты BZD-рецепторов)</h3>
<p>Зопиклон, золпидем, залеплон. Более избирательно действуют на α1-субъединицу ГАМКА → меньше миорелаксации и тревожности, но риск зависимости сохраняется; золпидем — лунатизм, амнезия.</p>
<h3>Мелатонинергические</h3>
<p><strong>Мелатонин</strong> — регулятор циркадных ритмов; при сменном графике, джетлаге, у пожилых. <strong>Рамелтеон</strong> — агонист МТ1/МТ2; нет зависимости.</p>
<h3>Антагонисты орексиновых рецепторов</h3>
<p><strong>Суворексант</strong> — блокирует рецепторы орексина (гипокретина), отвечающего за бодрствование. Не вызывает зависимости.</p>
<h3>Другие</h3>
<ul>
<li>Барбитураты (фенобарбитал) — устарели из-за высокого риска зависимости и угнетения дыхания</li>
<li>Антигистаминные (доксиламин, дифенгидрамин) — ОТС-снотворные</li>
</ul>`
  },
  {
    id: 28,
    title: "Противосудорожные средства",
    body: `
<p>Противоэпилептические препараты (ПЭП) снижают возбудимость нейронов и/или усиливают процессы торможения, предотвращая инициацию и распространение судорожных разрядов.</p>
<h3>Механизмы действия</h3>
<ul>
<li>Блокада Na⁺-каналов: карбамазепин, фенитоин, вальпроат, ламотриджин, лакосамид</li>
<li>Блокада Ca²⁺-каналов (Т-тип): этосуксимид — абсансы</li>
<li>Усиление ГАМК-ергического торможения: бензодиазепины, барбитураты, вигабатрин, тиагабин</li>
<li>Блокада глутаматных рецепторов: топирамат, перампанел</li>
<li>Модуляция кальциевых каналов (α2δ-субъединица): прегабалин, габапентин</li>
<li>Уникальный механизм: леветирацетам (связывает SV2A), лакосамид (медленная инактивация Na⁺)</li>
</ul>
<h3>По типу эпилепсии</h3>
<ul>
<li>Генерализованные тонико-клонические приступы: вальпроат, леветирацетам, ламотриджин</li>
<li>Абсансы: этосуксимид, вальпроат, ламотриджин</li>
<li>Парциальные приступы: карбамазепин, ламотриджин, леветирацетам, лакосамид</li>
<li>Эпилептический статус: диазепам в/в → фенитоин или вальпроат → фенобарбитал</li>
</ul>
<h3>НЛР важные</h3>
<ul>
<li>Вальпроат: гепатотоксичность, тератогенность (spina bifida)</li>
<li>Карбамазепин: гипонатриемия, синдром Стивенса–Джонсона, индукция CYP3A4</li>
<li>Фенитоин: гиперплазия дёсен, нарушение фолатного метаболизма</li>
</ul>`
  },
  {
    id: 29,
    title: "Анальгетики опиоидные",
    body: `
<p>Опиоидные анальгетики действуют через μ (мю), κ (каппа) и δ (дельта) опиоидные рецепторы, обеспечивая выраженное обезболивание преимущественно через μ-рецепторы.</p>
<h3>Классификация</h3>
<ul>
<li><strong>Сильные агонисты μ:</strong> морфин, фентанил, оксикодон, гидроморфон, метадон, меперидин (промедол)</li>
<li><strong>Слабые агонисты:</strong> кодеин, трамадол, трамадол</li>
<li><strong>Частичные агонисты/антагонисты:</strong> бупренорфин, буторфанол, налбуфин</li>
<li><strong>Антагонисты:</strong> налоксон, налтрексон</li>
</ul>
<h3>Фармакологические эффекты</h3>
<ul>
<li><strong>ЦНС:</strong> анальгезия, эйфория/дисфория, седация, угнетение дыхания (главный риск), миоз, противокашлевой</li>
<li><strong>ЖКТ:</strong> снижение перистальтики → запор, спазм сфинктера Одди</li>
<li><strong>Сердечно-сосудистая:</strong> брадикардия, гипотония (гистаминолиберация)</li>
<li><strong>Тошнота и рвота</strong> (стимуляция хеморецепторной триггерной зоны)</li>
</ul>
<h3>Особенности</h3>
<ul>
<li>Толерантность (снижение эффекта) и физическая зависимость при длительном применении</li>
<li>Трамадол — двойной механизм: μ-агонизм + ингибиция захвата НА и 5-НТ</li>
<li>Бупренорфин — частичный агонист μ; применяют при заместительной терапии опиоидной зависимости</li>
</ul>
<div class="drug-box"><div class="drug-label">Антидот при передозировке</div><ul>
<li>Налоксон (Narcan) — конкурентный антагонист; быстрая в/в отмена угнетения дыхания; T½ короче опиоидов → может потребоваться повторное введение</li>
</ul></div>`
  },
  {
    id: 30,
    title: "Неопиоидные анальгетики. НПВС",
    body: `
<p>НПВС — нестероидные противовоспалительные средства — ингибируют циклооксигеназу (ЦОГ-1 и ЦОГ-2), снижая синтез простагландинов, тромбоксана и простациклина.</p>
<h3>Эффекты НПВС</h3>
<ul>
<li><strong>Противовоспалительный</strong> — снижение ПГЕ₂, ПГI₂ в очаге</li>
<li><strong>Анальгетический</strong> — снижение сенсибилизации ноцицепторов</li>
<li><strong>Жаропонижающий</strong> — снижение ПГЕ₂ в гипоталамусе</li>
<li><strong>Антиагрегантный</strong> — необратимое ингибирование ЦОГ-1 тромбоцитов (аспирин)</li>
</ul>
<h3>Классификация</h3>
<ul>
<li><strong>Неселективные ЦОГ-1/ЦОГ-2:</strong> ибупрофен, диклофенак, напроксен, кетопрофен, аспирин, индометацин, пироксикам</li>
<li><strong>Селективные ЦОГ-2 (коксибы):</strong> целекоксиб, эторикоксиб — меньше ЖКТ-токсичности; риск кардиотоксичности</li>
<li><strong>Парацетамол (ацетаминофен)</strong> — ингибирует ЦОГ в ЦНС; анальгетик и жаропонижающий без противовоспалительного эффекта; при передозировке — гепатотоксичность (антидот — N-ацетилцистеин)</li>
<li><strong>Метамизол (анальгин)</strong> — сильный анальгетик; риск агранулоцитоза</li>
</ul>
<h3>НЛР НПВС</h3>
<ul>
<li>ЖКТ: язвы, кровотечения (ЦОГ-1 ингибирование снижает простациклин и слизь → гастропротекция снижается)</li>
<li>Почки: задержка натрия и воды, снижение СКФ при ХБП</li>
<li>Сердечно-сосудистые: повышение АД и риска тромбозов (ЦОГ-2 ингибиторы)</li>
<li>Аспириновая астма (~10%)</li>
</ul>`
  },
  {
    id: 31,
    title: "Психотропные средства",
    body: `
<p>Психотропные средства — ЛС, оказывающие преимущественное влияние на психические функции: восприятие, эмоции, мышление, поведение, сон.</p>
<h3>Классификация (по Делею и Деникеру, дополненная)</h3>
<ul>
<li><strong>Нейролептики (антипсихотики)</strong> — уменьшают психотическую симптоматику</li>
<li><strong>Транквилизаторы (анксиолитики)</strong> — снижают тревогу</li>
<li><strong>Седативные</strong> — общее успокоение</li>
<li><strong>Антидепрессанты</strong> — улучшают настроение при депрессии</li>
<li><strong>Нормотимики (стабилизаторы настроения)</strong> — лития соли, вальпроат, ламотриджин</li>
<li><strong>Психостимуляторы</strong> — повышают активность и работоспособность</li>
<li><strong>Ноотропы</strong> — улучшают когнитивные функции</li>
</ul>
<h3>Общие принципы применения</h3>
<ul>
<li>Постепенное наращивание дозы (titration) и медленная отмена</li>
<li>Длительный курс (антидепрессанты — минимум 6 месяцев)</li>
<li>Мониторинг НЛР (ЭКГ, метаболические показатели, функции печени)</li>
<li>Комбинирование с психотерапией</li>
</ul>`
  },
  {
    id: 32,
    title: "Антипсихотические средства (Нейролептики)",
    body: `
<p>Нейролептики — препараты для лечения психозов (шизофрения, биполярное расстройство, острые психотические эпизоды). Основной механизм — блокада D2-рецепторов мезолимбического пути.</p>
<h3>Классификация</h3>
<ul>
<li><strong>Типичные (I поколение):</strong> хлорпромазин (аминазин), галоперидол, трифтазин, дроперидол — высокая D2-блокада → экстрапирамидные НЛР</li>
<li><strong>Атипичные (II поколение):</strong> клозапин, оланзапин, рисперидон, кветиапин, арипипразол, зипразидон — блокада D2 + 5-HT2A + другие рецепторы; меньше ЭПС, но метаболические НЛР</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Шизофрения (позитивная симптоматика — галлюцинации, бред, возбуждение)</li>
<li>Биполярное расстройство (мания)</li>
<li>Тяжёлые психозы другой этиологии</li>
<li>Тики, синдром Туретта (галоперидол)</li>
<li>Рвота рефрактерная (хлорпромазин)</li>
</ul>
<h3>НЛР</h3>
<ul>
<li><strong>ЭПС:</strong> паркинсонизм, акатизия (двигательное беспокойство), острая дистония, поздняя дискинезия (необратима!)</li>
<li><strong>Злокачественный нейролептический синдром</strong> — гипертермия, ригидность, нарушение сознания (редко, опасно для жизни)</li>
<li><strong>Метаболические (атипичные):</strong> ожирение, дислипидемия, СД2</li>
<li>Гиперпролактинемия (рисперидол), удлинение QT, седация, постуральная гипотензия</li>
</ul>`
  },
  {
    id: 33,
    title: "Транквилизаторы (Анксиолитики)",
    body: `
<p>Анксиолитики уменьшают тревогу, страх, эмоциональное напряжение без выраженного влияния на когнитивные функции и без антипсихотического эффекта.</p>
<h3>Бензодиазепины</h3>
<p>Усиливают ГАМК-А-рецепторное торможение (↑ частоты открытия Cl⁻-канала). Классические эффекты: анксиолитический, снотворный, миорелаксирующий, противосудорожный, амнестический.</p>
<ul>
<li><strong>Длинные (T½ > 24 ч):</strong> диазепам (реланиум), хлордиазепоксид, клоназепам</li>
<li><strong>Промежуточные:</strong> алпразолам, лоразепам</li>
<li><strong>Короткие:</strong> мидазолам (в/в седация, премедикация)</li>
</ul>
<p>НЛР: седация, атаксия, нарушение памяти, зависимость и синдром отмены. Антидот: флумазенил (конкурентный антагонист BZD-рецепторов).</p>
<h3>Буспирон</h3>
<p>Частичный агонист 5-НТ1А-рецепторов; нет зависимости, нет седации. Развитие эффекта через 2–4 недели → не для острой тревоги.</p>
<h3>Другие анксиолитики</h3>
<ul>
<li><strong>Гидроксизин (атаракс)</strong> — антигистаминный + анксиолитический; нет зависимости</li>
<li><strong>Афобазол</strong> — небензодиазепиновый; мягкое анксиолитическое действие</li>
<li><strong>Прегабалин, габапентин</strong> — при тревожном расстройстве и социальной фобии</li>
</ul>`

  {
    id: 34,
    title: "Седативные средства",
    body: `
<p>Седативные ЛС оказывают общее успокаивающее действие — снижают эмоциональную возбудимость, облегчают засыпание в обычных дозах, не вызывают глубокого сна. Отличие от транквилизаторов: менее специфичны по механизму, слабее.</p>
<h3>Препараты растительного происхождения</h3>
<ul>
<li><strong>Валериана</strong> — взаимодействует с ГАМК-А и аденозиновыми рецепторами; настой, экстракт, таблетки</li>
<li><strong>Пустырник</strong> — близкий механизм; настой, экстракт</li>
<li><strong>Пассифлора (страстоцвет)</strong> — ГАМК-А-модулятор</li>
<li><strong>Мелисса, хмель</strong> — в составе сборов</li>
</ul>
<h3>Препараты брома</h3>
<p>Натрия и калия бромид — усиливают тормозные процессы в коре; применяют при повышенной возбудимости нервной системы. Кумулируют при длительном приёме → бромизм (угри, насморк, нарушение памяти).</p>
<h3>Комбинированные препараты</h3>
<ul>
<li><strong>Корвалол, валокордин</strong> — фенобарбитал + этиловый эфир бромизовалериановой кислоты + мятное масло; выраженный седативный и слабый снотворный эффект</li>
<li><strong>Ново-пассит</strong> — экстракты нескольких растений + гвайфенезин</li>
</ul>
<p>Важно: Корвалол содержит фенобарбитал — при длительном приёме возможны зависимость и взаимодействия с другими ЛС (индукция CYP).</p>`

  {
    id: 35,
    title: "Психостимуляторы",
    body: `
<p>Психостимуляторы повышают умственную и физическую работоспособность, уменьшают сонливость и усталость, улучшают концентрацию внимания — через усиление моноаминергической (DA, НА, 5-НТ) нейропередачи.</p>

<li><strong>Кофеин</strong> — блокатор аденозиновых A1/A2A рецепторов; мягкий стимулятор; применяют при головных болях (в комбинациях), апноэ новорождённых</li>

  {

    title: "Антидепрессанты",
    body: `
<p>Антидепрессанты повышают передачу серотонина (5-НТ), норадреналина (НА) и/или дофамина (DA), устраняя симптомы депрессии. Эффект развивается постепенно (2–4 недели).</p>
<h3>Классификация</h3>
<ul>
<li><strong>СИОЗС (SSRI)</strong> — ингибиторы обратного захвата серотонина: флуоксетин, сертралин, эсциталопрам, пароксетин; первая линия; безопаснее при передозировке</li>
<li><strong>СИОЗСН (SNRI)</strong> — ингибиторы 5-НТ + НА: венлафаксин, дулоксетин; при депрессии с болевым синдромом</li>
<li><strong>ТЦА (трициклические)</strong> — амитриптилин, имипрамин, кломипрамин; неселективные блокаторы захвата + холинергические/гистаминные НЛР; кардиотоксичны в OD</li>
<li><strong>ИМАО</strong> — необратимые (фенелзин) и обратимые (моклобемид, пирлиндол); «сырный эффект» с тирамином → гипертонический криз</li>

<h3>НЛР СИОЗС</h3>

<li>Половые дисфункции, тошнота, бессонница</li>

</ul>`

  {

    body: `
<p>Ноотропы (от греч. noos — ум, tropos — направление) — ЛС, улучшающие высшие психические функции: память, обучение, концентрацию внимания, особенно при их нарушении.</p>

    body: `
<p>Общетонизирующие средства (биостимуляторы) повышают общую резистентность организма, работоспособность, улучшают трофику тканей при астении, переутомлении, в период реконвалесценции.</p>

    body: `

    title: "Бронхолитические препараты",
    body: `
<p>Бронхолитики снимают спазм гладкой мускулатуры бронхов, расширяя просвет дыхательных путей. Основа лечения бронхиальной астмы и ХОБЛ.</p>
<h3>β2-адреномиметики</h3>
<ul>
<li><strong>Короткодействующие (КДБА, 4–6 ч):</strong> сальбутамол, фенотерол, тербуталин — препараты «скорой помощи», при острых приступах</li>
<li><strong>Длительнодействующие (ДДБА, 12 ч):</strong> формотерол, сальметерол — базисная терапия вместе с иГКС</li>
<li><strong>Сверхдлительные (УДБА, 24 ч):</strong> олодатерол, индакатерол — при ХОБЛ</li>
</ul>
<h3>М-холиноблокаторы (антихолинергические)</h3>
<ul>
<li><strong>Короткодействующий:</strong> ипратропий (атровент) — 6–8 ч; чаще при ХОБЛ, также при БА</li>
<li><strong>Длительнодействующий:</strong> тиотропий (спирива) — 24 ч; при ХОБЛ; снижает обострения</li>
<li><strong>Гликопирроний, умеклидиний</strong> — новые ДДХБ</li>
</ul>
<h3>Метилксантины</h3>
<ul>
<li><strong>Теофиллин</strong> — ингибитор ФДЭ → ↑цАМФ → бронходилатация; узкий терапевтический индекс; мониторинг уровня в крови</li>
<li><strong>Аминофиллин (эуфиллин)</strong> — в/в при тяжёлом бронхоспазме</li>
</ul>
<h3>Комбинированные препараты</h3>
<p>КДБА+КДХБ: фенотерол+ипратропий (беродуал). ДДБА+ДДХБ: формотерол+гликопирроний, олодатерол+тиотропий. иГКС+ДДБА: флутиказон+сальметерол (серетид), будесонид+формотерол (симбикорт).</p>`
  },
  {
    id: 45,
    title: "ЛС, влияющие на функции органов пищеварения",
    body: `
<p>Группа ЛС для ЖКТ чрезвычайно разнообразна и охватывает весь пищеварительный тракт — от полости рта до прямой кишки.</p>
<h3>По направленности действия</h3>
<ul>
<li><strong>Влияющие на секрецию:</strong> антисекреторные (ИПП, Н₂-блокаторы, антихолинергические), стимуляторы секреции (горечи, пентагастрин)</li>
<li><strong>Влияющие на моторику:</strong> прокинетики (метоклопрамид, домперидон, итоприд), спазмолитики (дротаверин, папаверин), слабительные, противодиарейные</li>
<li><strong>Гастропротекторы:</strong> сукральфат, висмут трикалия дицитрат</li>
<li><strong>Ферментные препараты:</strong> панкреатин, мезим</li>
<li><strong>Желчегонные и гепатопротекторы</strong></li>
<li><strong>Антихеликобактерные</strong></li>
</ul>
<h3>Принципы назначения</h3>
<ul>
<li>Учитывать кислотозависимость, фазу заболевания, сопутствующую патологию</li>
<li>Приём относительно еды имеет значение (антациды — через 1 ч после еды, ИПП — за 30 мин до еды)</li>
<li>Большинство гастроинтестинальных ЛС назначают курсами</li>
</ul>`
  },
  {
    id: 46,
    title: "ЛС, влияющие на аппетит. Горечи",
    body: `
<p>Регуляция аппетита — сложный нейрогуморальный процесс. ЛС могут как повышать, так и снижать аппетит.</p>
<h3>Горечи (Amara) — стимуляторы аппетита</h3>
<p>Горечи содержат горькие гликозиды (генциопикрин в горечавке, абсинтин в полыни), раздражающие вкусовые рецепторы полости рта → рефлекторное усиление выработки желудочного сока и желчи → улучшение аппетита и пищеварения.</p>
<ul>
<li>Настойка полыни горькой</li>
<li>Настойка горечавки</li>
<li>Сборы аппетитные (полынь + аир + тысячелистник)</li>
</ul>
<p>Применяют за 20–30 мин до еды. Противопоказаны при гиперацидном гастрите и язвенной болезни.</p>
<h3>Средства, снижающие аппетит (анорексигенные)</h3>
<ul>
<li><strong>Орлистат</strong> — ингибитор желудочно-кишечной липазы; уменьшает всасывание жиров на 30%; НЛР: жирная диарея, дефицит жирорастворимых витаминов</li>
<li><strong>Сибутрамин</strong> — ингибитор обратного захвата НА/5-НТ; центральная анорексия; ограничен из-за риска ССС</li>
<li><strong>Агонисты ГПП-1 (лираглутид, семаглутид)</strong> — снижают аппетит через ГПП-1-рецепторы гипоталамуса; применяют при ожирении и СД2</li>
<li><strong>Налтрексон/бупропион (Контрав)</strong> — комбинация для снижения веса</li>
</ul>`
  },
  {
    id: 47,
    title: "Антисекреторные препараты. Н₂-гистаминоблокаторы",
    body: `
<p>Н₂-гистаминоблокаторы блокируют гистаминовые Н₂-рецепторы париетальных клеток желудка → снижение стимулированной (ночной и базальной) секреции HCl.</p>
<h3>Поколения Н₂-блокаторов</h3>
<ul>
<li><strong>I:</strong> циметидин — первый; много взаимодействий (ингибирует CYP), антиандрогенный эффект (гинекомастия)</li>
<li><strong>II:</strong> ранитидин — изъят из рынка ряда стран (NDMA-примеси)</li>
<li><strong>III:</strong> фамотидин — наиболее применяемый; нет антиандрогенных эффектов, меньше взаимодействий; мощнее циметидина в 20–50 раз</li>
<li><strong>IV:</strong> низатидин, роксатидин</li>
</ul>
<h3>Фармакологические эффекты</h3>
<ul>
<li>Снижение объёма и кислотности желудочного сока (ночная секреция на 90%)</li>
<li>Снижение секреции пепсина</li>
<li>Относительно слабее ИПП по подавлению дневной секреции</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Язвенная болезнь желудка и 12п.к.</li>
<li>Рефлюкс-эзофагит (ГЭРБ)</li>
<li>Синдром Золлингера–Эллисона (гастриномы)</li>
<li>Профилактика стресс-язв у тяжёлых пациентов</li>
</ul>
<p>Сейчас вытеснены ИПП, но применяются при невозможности приёма ИПП, при стрессовых язвах (в/в фамотидин).</p>`
  },
  {
    id: 48,
    title: "Антисекреторные препараты. Ингибиторы протонного насоса",
    body: `
<p>Ингибиторы протонного насоса (ИПП) необратимо ингибируют Н⁺/К⁺-АТФазу (протонный насос) париетальных клеток — конечного фермента секреции HCl. Наиболее мощные антисекреторные препараты.</p>
<h3>Механизм активации</h3>
<p>ИПП — пролекарства (основания). В кислой среде секреторных канальцев превращаются в активные сульфенамиды, которые ковалентно связываются с цистеиновыми остатками Н⁺/К⁺-АТФазы → необратимая блокада. Секреция восстанавливается только после синтеза новых молекул насоса (≈36–72 ч).</p>
<h3>Препараты</h3>
<ul>
<li><strong>Омепразол</strong> — первый ИПП; метаболизируется CYP2C19 (полиморфизм!)</li>
<li><strong>Лансопразол</strong></li>
<li><strong>Пантопразол</strong> — меньше лекарственных взаимодействий</li>
<li><strong>Рабепразол</strong> — меньше зависит от CYP2C19, более быстрый эффект</li>
<li><strong>Эзомепразол</strong> — S-энантиомер омепразола, более предсказуемая фармакокинетика</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Язвенная болезнь (в т.ч. компонент эрадикации H. pylori)</li>
<li>ГЭРБ и эрозивный эзофагит</li>
<li>Синдром Золлингера–Эллисона</li>
<li>Профилактика НПВС-гастропатии</li>
</ul>
<h3>НЛР при длительном применении</h3>
<ul>
<li>Гипомагниемия, гипокальциемия, остеопороз</li>
<li>Дефицит витамина В₁₂ (снижение всасывания)</li>
<li>Гиперплазия ECL-клеток (гипергастринемия)</li>
<li>Риск кишечных инфекций (C. difficile)</li>
</ul>`
  },
  {
    id: 49,
    title: "Антациды. М-холинолитики",
    body: `
<p>Антациды — лекарства, нейтрализующие соляную кислоту в просвете желудка, повышая рН. Действуют быстро, но кратковременно.</p>
<h3>Классификация антацидов</h3>
<ul>
<li><strong>Системные (всасывающиеся):</strong> натрия гидрокарбонат (пищевая сода) — быстро нейтрализует кислоту, но поглощается → алкалоз, «кислотный рикошет»</li>
<li><strong>Несистемные (невсасывающиеся) — предпочтительные:</strong>
  <ul>
  <li>Алюминия гидроксид — слабый запор, связывает фосфаты</li>
  <li>Магния гидроксид — слабительный эффект</li>
  <li>Комбинации Al+Mg: альмагель, маалокс, гастал — сбалансированный эффект</li>
  <li>Кальция карбонат — «кислотный рикошет», молочно-щелочной синдром</li>
  </ul>
</li>
</ul>
<p>Принимают через 1–1,5 ч после еды и на ночь. Снижают всасывание других ЛС → интервал 2 ч.</p>
<h3>М-холинолитики в гастроэнтерологии</h3>
<p>Блокируют М1- (гастрин) и М3-рецепторы → снижение кислотной секреции, уменьшение моторики (спазмолитический эффект). Применяют при ЯБ и спастических болях в ЖКТ.</p>
<ul>
<li><strong>Атропин</strong> — классический М-ХБ; системные побочные эффекты</li>
<li><strong>Платифиллин</strong> — спазмолитик + α-блокатор; при спазмах ЖКТ и желчных путей</li>
<li><strong>Пирензепин (гастроцепин)</strong> — М1-холиноблокатор; снижает секрецию желудка без системных побочных эффектов</li>
</ul>`
  },
  {
    id: 50,
    title: "Гастропротекторы",
    body: `
<p>Гастропротекторы защищают слизистую оболочку желудка, усиливая её защитные механизмы или образуя физический барьер над язвенным дефектом.</p>
<h3>Сукральфат</h3>
<p>Соль алюминия и сульфатированной сахарозы. В кислой среде образует вязкий гель, который прилипает к язвенному дефекту, механически защищая его. Дополнительно: связывает желчь и пепсин, стимулирует синтез простагландинов, улучшает слизеобразование. Принимают за 30–60 мин до еды. Мало системных эффектов (≈5% всасывается). Взаимодействие: снижает всасывание многих ЛС.</p>
<h3>Коллоидный висмут (Де-нол, висмута трикалия дицитрат)</h3>
<ul>
<li>Образует защитную плёнку на дне язвы</li>
<li>Вяжущее и антисекреторное действие</li>
<li>Антихеликобактерная активность</li>
<li>Входит в схемы эрадикации H. pylori</li>
</ul>
<h3>Мизопростол (синтетический ПГЕ₁)</h3>
<ul>
<li>Связывается с простагландиновыми рецепторами → стимуляция слизи и бикарбоната, снижение секреции HCl</li>
<li>Применяют для профилактики НПВС-индуцированных язв</li>
<li>НЛР: диарея, спазмы, противопоказан при беременности (уратэротоническое действие)</li>
</ul>
<h3>Ребамипид</h3>
<p>Стимулирует синтез простагландинов, повышает слизеобразование, оказывает противовоспалительное действие в слизистой. Применяют при гастропатиях, эрозивном гастрите.</p>`
  },
  {
    id: 51,
    title: "Антихеликобактерные препараты",
    body: `
<p>Helicobacter pylori — грамотрицательная спиральная бактерия, колонизирующая слизистую желудка. Является причиной большинства язв желудка (~70%) и 12п.к. (~95%), а также фактором риска рака желудка.</p>
<h3>Диагностика H. pylori</h3>
<ul>
<li>Уреазный дыхательный тест (ДТ)</li>
<li>Тест на антиген H. pylori в кале</li>
<li>Биопсия слизистой (гистология, быстрый уреазный тест)</li>
<li>Серология (IgG) — говорит о контакте, не об активной инфекции</li>
</ul>
<h3>Препараты</h3>
<ul>
<li><strong>Антибиотики:</strong> кларитромицин, амоксициллин, метронидазол, тетрациклин, левофлоксацин</li>
<li><strong>ИПП</strong> — создают кислую среду, неблагоприятную для H. pylori; повышают концентрацию антибиотиков в слизистой</li>
<li><strong>Висмута препараты</strong> — прямой бактерицидный эффект; входят в схемы «квадротерапии»</li>
</ul>
<h3>Схемы эрадикации (рекомендации Маастрихт V)</h3>
<ul>
<li><strong>Стандартная тройная (7–14 дней):</strong> ИПП + кларитромицин + амоксициллин</li>
<li><strong>Квадротерапия с висмутом (10–14 дней):</strong> ИПП + висмут + тетрациклин + метронидазол — при резистентности к кларитромицину</li>
<li><strong>Квадротерапия без висмута (конкомитантная):</strong> ИПП + амоксициллин + кларитромицин + метронидазол</li>
<li><strong>Терапия «спасения»:</strong> ИПП + амоксициллин + левофлоксацин</li>
</ul>`
  },
  {
    id: 52,
    title: "Средства для лечения язвенной болезни. Принципы комплексного лечения",
    body: `
<p>Язвенная болезнь (ЯБ) — хроническое заболевание с образованием язв в желудке или 12-перстной кишке. Основные причины: H. pylori, НПВС, гиперацидность.</p>
<h3>Принципы комплексного лечения</h3>
<ol>
<li><strong>Эрадикация H. pylori</strong> (если подтверждена) — устраняет основную причину, предотвращает рецидивы</li>
<li><strong>Антисекреторная терапия</strong> — ИПП (стандартные дозы 4–8 недель); Н₂-блокаторы как альтернатива</li>
<li><strong>Гастропротекция</strong> — сукральфат, препараты висмута, мизопростол</li>
<li><strong>Антациды</strong> — для симптоматического облегчения боли</li>
<li><strong>Устранение провоцирующих факторов</strong> — отмена НПВС, аспирина; прекращение курения (замедляет заживление); диета</li>
<li><strong>Контроль эрадикации</strong> — через 4–6 нед после окончания курса</li>
</ol>
<h3>Хирургическое лечение</h3>
<p>Ваготомия (перерезка блуждающего нерва) — устаревший метод; сейчас применяют только при осложнениях (перфорация, кровотечение, стеноз).</p>
<h3>Профилактика рецидивов</h3>
<ul>
<li>Эрадикация H. pylori (снижает рецидивы с 70% до <5% в год)</li>
<li>Защита при НПВС: ИПП или мизопростол совместно</li>
<li>Отказ от курения и алкоголя</li>
</ul>`
  },
  {
    id: 53,
    title: "Гепатопротекторы",
    body: `
<p>Гепатопротекторы — ЛС, защищающие гепатоциты от повреждения и стимулирующие регенерацию печени. Применяют при алкогольных, токсических, вирусных и жировых поражениях печени.</p>
<h3>Классификация и препараты</h3>
<ul>
<li><strong>Флавоноиды расторопши (силимарин):</strong> Карсил, Легалон, Силивер — стабилизируют мембраны гепатоцитов, антиоксиданты, стимулируют синтез белков и регенерацию. Хорошая доказательная база</li>
<li><strong>Препараты фосфатидилхолина (эссенциальные фосфолипиды):</strong> Эссенциале Форте — встраиваются в мембраны гепатоцитов, восстанавливая их структуру; улучшают метаболизм жиров в печени</li>
<li><strong>Препараты УДХК (урсодезоксихолевой кислоты):</strong> Урсофальк, Урсосан — гидрофильная желчная кислота; снижает цитотоксичность желчных кислот, иммуномодулирующий эффект. Доказана эффективность при холестазе, ПБЦ, ЖКБ</li>
<li><strong>Адеметионин (гептрал)</strong> — донор метильных групп; активирует трансметилирование в печени, предшественник глутатиона; при алкогольном гепатите и холестазе</li>
<li><strong>Орнитин-аспартат (гепа-мерц)</strong> — снижает уровень аммиака; при печёночной энцефалопатии</li>
</ul>
<h3>Показания</h3>
<ul>
<li>Алкогольная болезнь печени</li>
<li>НАЖБП (стеатогепатит)</li>
<li>Токсическое поражение (лекарства, яды)</li>
<li>Хронические гепатиты</li>
<li>Желчнокаменная болезнь (УДХК)</li>
</ul>`
  },
  {
    id: 54,
    title: "Желчегонные препараты",
    body: `
<p>Желчегонные средства усиливают образование желчи (холеретики) или улучшают её выведение из желчных путей в кишечник (холекинетики).</p>
<h3>Холеретики (стимулируют образование желчи)</h3>
<ul>
<li><strong>Содержащие желчные кислоты:</strong> аллохол (желчь животных + чеснок + крапива + уголь), холензим (желчь + ферменты)</li>
<li><strong>Синтетические:</strong> оксафенамид (осалмид), цикловалон — усиливают секрецию желчи</li>
<li><strong>Растительные холеретики:</strong> кукурузные рыльца, бессмертник (фламин), пижма, артишок (хофитол), расторопша — мягкий холеретический + гепатопротективный эффект</li>
